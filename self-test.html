<!doctype html>
<html lang="zh-CN">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Open Tools Starter Self Test</title>
    <style>
      :root {
        color-scheme: light dark;
        font-family:
          Inter, ui-sans-serif, system-ui, -apple-system, BlinkMacSystemFont,
          "Segoe UI", sans-serif;
      }

      body {
        margin: 0;
        background: #f5f7fb;
        color: #20242c;
      }

      main {
        max-width: 1040px;
        margin: 0 auto;
        padding: 24px;
      }

      h1 {
        margin: 0 0 8px;
        font-size: clamp(1.6rem, 4vw, 2.4rem);
      }

      .panel {
        border: 1px solid #d9dee8;
        border-radius: 8px;
        background: #fff;
        box-shadow: 0 16px 36px rgb(40 48 64 / 10%);
        overflow: hidden;
      }

      .results {
        display: grid;
        gap: 10px;
        padding: 16px;
      }

      .result {
        display: flex;
        align-items: center;
        justify-content: space-between;
        gap: 12px;
        border: 1px solid #e5e8ef;
        border-radius: 8px;
        padding: 12px 14px;
        background: #fbfcff;
      }

      .result.pass {
        border-color: #91d2c8;
      }

      .result.fail {
        border-color: #f1a6a6;
      }

      .badge {
        border-radius: 999px;
        padding: 4px 10px;
        font-size: 0.78rem;
        font-weight: 700;
      }

      .pass .badge {
        background: #dff5ef;
        color: #13594f;
      }

      .fail .badge {
        background: #ffe3e3;
        color: #9a2626;
      }

      iframe {
        width: 100%;
        min-height: 720px;
        border: 0;
        border-top: 1px solid #d9dee8;
        background: #fff;
      }

      @media (prefers-color-scheme: dark) {
        body {
          background: #11151d;
          color: #eff3f8;
        }

        .panel {
          background: #171c25;
          border-color: #303847;
        }

        .result {
          background: #1d2330;
          border-color: #303847;
        }
      }
    </style>
  </head>
  <body>
    <main>
      <h1>Open Tools Starter Self Test</h1>
      <p>Checks the first-stage template shell in the browser.</p>
      <section class="panel" aria-label="Self test results">
        <div id="self-test-results" class="results" aria-live="polite"></div>
        <iframe id="app-frame" src="./index.html" title="Open Tools Starter app"></iframe>
      </section>
    </main>
    <script src="./self-test.js" defer></script>
  </body>
</html>
